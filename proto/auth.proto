syntax = "proto3";

package auth;

option go_package = "github.com/ybotet/pz8-pipelineCICD-go/gen/proto/auth";

service AuthService {
  rpc Verify(VerifyRequest) returns (VerifyResponse);
}

message VerifyRequest {
  string token = 1;
}

message VerifyResponse {
  bool valid = 1;
  string subject = 2;
}